<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>brute — launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #17131c;
    --surface: #241d2b;
    --surface-2: #2e2539;
    --rim: #3d3348;
    --fg: #ffffff;
    --muted: #9a94a6;
    --accent-1: #FFB020;
    --accent-2: #F5371F;
    --accent-solid: #FB5A1E;
    --accent-gradient: linear-gradient(135deg, #FFB020, #F5371F);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  }

  .stage {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 72px;
    padding: 80px 40px;
  }

  .phone-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .phone-frame {
    width: 391px;
    height: 826px;
    background: #000000;
    border-radius: 54px;
    padding: 12px;
    box-shadow:
      0 40px 90px -20px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    position: relative;
  }

  .screen {
    width: 100%;
    height: 100%;
    border-radius: 42px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 5;
    color: var(--fg);
  }

  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-icons svg { display: block; }

  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 108px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 6;
  }

  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.55);
    z-index: 5;
  }

  /* center content */
  .lockup {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 32px;
  }

  .glow {
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251, 90, 30, 0.16) 0%, rgba(251, 90, 30, 0.05) 45%, rgba(251, 90, 30, 0) 72%);
    pointer-events: none;
    z-index: 0;
  }

  .logo {
    width: 96px;
    height: 96px;
    position: relative;
    z-index: 1;
  }

  .wordmark {
    margin-top: 22px;
    font-family: 'Bricolage Grotesque', -apple-system, sans-serif;
    font-weight: 800;
    font-size: 42px;
    letter-spacing: -0.02em;
    color: var(--fg);
    position: relative;
    z-index: 1;
  }

  /* loading affordance */
  .loading-block {
    margin-top: 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .dots {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-1);
    opacity: 0.25;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  .loading-copy {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0;
    font-weight: 450;
  }

  /* caption under phone */
  .caption {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 550;
    color: var(--muted);
    text-transform: lowercase;
    letter-spacing: 0.02em;
  }

  /* vertical stacking override */
  .stage{flex-direction:column!important;align-items:center!important;flex-wrap:nowrap!important;min-width:0!important;overflow-x:visible!important;gap:64px!important;padding:56px 24px!important;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="flame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB020" />
      <stop offset="100%" stop-color="#F5371F" />
    </linearGradient>
    <symbol id="brute-logo" viewBox="0 0 120 120">
      <path d="M20 22 C20 15 26 10 34 10 L86 10 C94 10 100 15 100 22 L100 66 C100 73 94 78 86 78 L48 78 L28 96 C25 98.5 21 96.5 21 93 L21 78 C20 77 20 73 20 66 Z"
            fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linejoin="round" />
      <path d="M60 26 C51 37 46 46 46 55 C46 65 52 72 60 72 C68 72 74 65 74 55 C74 48 71 41 65 33 C64 38 61 40 58 38 C56 36 57 32 60 26 Z"
            fill="url(#flame-grad)" />
    </symbol>
  </defs>
</svg>

<div class="stage">

  <!-- FRAME 1: splash -->
  <div class="phone-block">
    <div class="phone-frame">
      <div class="screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span class="time">9:41</span>
          <span class="status-icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M1 9L1 11.5H3V9H1Z" fill="#fff"/><path d="M5.5 6.5V11.5H7.5V6.5H5.5Z" fill="#fff"/><path d="M10 3.5V11.5H12V3.5H10Z" fill="#fff"/><path d="M14.5 0.5V11.5H16.5V0.5H14.5Z" fill="#fff" fill-opacity="0.4"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.5C8.6 10.5 9.1 10.1 9.1 9.5C9.1 8.9 8.6 8.5 8 8.5C7.4 8.5 6.9 8.9 6.9 9.5C6.9 10.1 7.4 10.5 8 10.5Z" fill="#fff"/><path d="M8 3.5C10 3.5 11.8 4.2 13.2 5.4L14.5 3.8C12.7 2.3 10.5 1.5 8 1.5C5.5 1.5 3.3 2.3 1.5 3.8L2.8 5.4C4.2 4.2 6 3.5 8 3.5Z" fill="#fff"/><path d="M8 6.5C9.2 6.5 10.4 6.9 11.3 7.7L12.6 6.1C11.3 5 9.7 4.5 8 4.5C6.3 4.5 4.7 5 3.4 6.1L4.7 7.7C5.6 6.9 6.8 6.5 8 6.5Z" fill="#fff"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="2.5" stroke="#fff" stroke-opacity="0.5"/><rect x="2.5" y="2.5" width="17" height="7" rx="1.5" fill="#fff"/><rect x="22" y="4" width="1.5" height="4" rx="0.75" fill="#fff" fill-opacity="0.5"/></svg>
          </span>
        </div>

        <div class="lockup">
          <div class="glow"></div>
          <svg class="logo"><use href="#brute-logo" /></svg>
          <div class="wordmark">brute</div>
        </div>

        <div class="home-indicator"></div>
      </div>
    </div>
    <div class="caption">splash</div>
  </div>

  <!-- FRAME 2: loading -->
  <div class="phone-block">
    <div class="phone-frame">
      <div class="screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span class="time">9:41</span>
          <span class="status-icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M1 9L1 11.5H3V9H1Z" fill="#fff"/><path d="M5.5 6.5V11.5H7.5V6.5H5.5Z" fill="#fff"/><path d="M10 3.5V11.5H12V3.5H10Z" fill="#fff"/><path d="M14.5 0.5V11.5H16.5V0.5H14.5Z" fill="#fff" fill-opacity="0.4"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.5C8.6 10.5 9.1 10.1 9.1 9.5C9.1 8.9 8.6 8.5 8 8.5C7.4 8.5 6.9 8.9 6.9 9.5C6.9 10.1 7.4 10.5 8 10.5Z" fill="#fff"/><path d="M8 3.5C10 3.5 11.8 4.2 13.2 5.4L14.5 3.8C12.7 2.3 10.5 1.5 8 1.5C5.5 1.5 3.3 2.3 1.5 3.8L2.8 5.4C4.2 4.2 6 3.5 8 3.5Z" fill="#fff"/><path d="M8 6.5C9.2 6.5 10.4 6.9 11.3 7.7L12.6 6.1C11.3 5 9.7 4.5 8 4.5C6.3 4.5 4.7 5 3.4 6.1L4.7 7.7C5.6 6.9 6.8 6.5 8 6.5Z" fill="#fff"/></svg>
            <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="2.5" stroke="#fff" stroke-opacity="0.5"/><rect x="2.5" y="2.5" width="17" height="7" rx="1.5" fill="#fff"/><rect x="22" y="4" width="1.5" height="4" rx="0.75" fill="#fff" fill-opacity="0.5"/></svg>
          </span>
        </div>

        <div class="lockup">
          <div class="glow"></div>
          <svg class="logo"><use href="#brute-logo" /></svg>
          <div class="wordmark">brute</div>

          <div class="loading-block">
            <div class="dots">
              <span></span><span></span><span></span>
            </div>
            <div class="loading-copy">sharpening the insults…</div>
          </div>
        </div>

        <div class="home-indicator"></div>
      </div>
    </div>
    <div class="caption">loading</div>
  </div>

</div>


<script>
/* brute mock helper: zoom-fit + canonical logo (injected) */
(function(){
  function fit(){var s=document.querySelector('.stage');if(!s)return;s.style.zoom='';var w=0;Array.prototype.forEach.call(s.children,function(c){w=Math.max(w,c.getBoundingClientRect().width);});if(!w)return;s.style.zoom=Math.min(1,(window.innerWidth-24)/w);}
  var N=0;
  function inner(){N++;return '<defs><linearGradient id="bf'+N+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFB020"/><stop offset="1" stop-color="#F5371F"/></linearGradient></defs><g fill="#ffffff"><rect x="200" y="212" width="624" height="486" rx="118"/><path d="M356 656 L300 800 L470 690 Z"/></g><path fill="url(#bf'+N+')" d="M512 300 C556 372 636 410 636 500 A124 124 0 0 1 388 500 C388 452 424 416 424 416 C430 470 456 492 476 504 C440 430 484 356 512 300 Z"/>';}
  function swap(svg){if(!svg||svg.__brute)return;svg.__brute=1;svg.setAttribute('viewBox','0 0 1024 1024');svg.setAttribute('fill','none');svg.innerHTML=inner();}
  function logos(){
    document.querySelectorAll('.wordmark').forEach(function(wm){var p=wm.parentElement;var svg=p&&p.querySelector('svg');if(!svg&&p&&p.parentElement)svg=p.parentElement.querySelector('svg');swap(svg);});
    document.querySelectorAll('.logo svg,.logo-bubble svg').forEach(swap);
    document.querySelectorAll('.logo-bubble,.logo').forEach(function(el){if(el.tagName&&el.tagName.toLowerCase()==='svg')swap(el);});
  }
  function run(){try{logos();}catch(e){}fit();}
  window.addEventListener('resize',fit);
  if(document.readyState!=='loading')run();else document.addEventListener('DOMContentLoaded',run);
  window.addEventListener('load',run);
})();
</script>
</body>
</html>
